<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitTrack Pro - iOS 26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ios-bg: #F2F2F7; 
            --ios-accent: #007AFF; 
            --ios-card: rgba(255, 255, 255, 0.75);
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--ios-bg); 
            color: #1c1c1e;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-glass { 
            background: var(--ios-card); 
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%); 
            border-radius: 28px; 
            border: 0.5px solid rgba(255, 255, 255, 0.3); 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: var(--ios-accent) !important; }
        .btn-animate:active { transform: scale(0.96); }
        
        /* Animaciones */
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-ios { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="pb-32">

    <header class="pt-14 px-6 pb-4 sticky top-0 z-50 bg-[#F2F2F7]/90 backdrop-blur-md">
        <div id="live-activity" class="hidden mb-4 p-4 bg-black text-white rounded-[22px] flex justify-between items-center shadow-2xl animate-ios">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></div>
                <span id="timer" class="font-mono text-lg font-bold">00:00</span>
            </div>
            <span class="text-[10px] font-black opacity-50 tracking-widest">ENTRENO ACTIVO</span>
        </div>
        <div class="flex justify-between items-end">
            <div>
                <p id="current-date" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">MIÉRCOLES, 4 DE MARZO</p>
                <h1 id="page-title" class="text-3xl font-extrabold tracking-tight">Actividad</h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-black/5 overflow-hidden">
                <img src="https://ui-avatars.com/api/?name=User&background=F2F2F7&color=007AFF" alt="Profile">
            </div>
        </div>
    </header>

    <main id="main-content" class="px-4 mt-2 space-y-6">
        
        <div id="view-hoy" class="space-y-6 animate-ios">
            <section class="ios-glass p-5">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="font-bold text-sm text-slate-400 uppercase tracking-tight">Marzo 2026</h3>
                    <button class="text-blue-600 text-xs font-bold">Ver calendario</button>
                </div>
                <div class="flex justify-between gap-2 overflow-x-auto no-scrollbar">
                    <div class="flex flex-col items-center min-w-[52px] py-3 rounded-2xl bg-white/40 border border-white/20">
                        <span class="text-[9px] font-black text-slate-400">LUN</span><span class="text-lg font-bold">2</span>
                    </div>
                    <div class="flex flex-col items-center min-w-[52px] py-3 rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-200">
                        <span class="text-[9px] font-black opacity-70">MAR</span><span class="text-lg font-bold">3</span>
                        <div class="w-1 h-1 bg-white rounded-full mt-1"></div>
                    </div>
                    <div class="flex flex-col items-center min-w-[52px] py-3 rounded-2xl bg-white/40 border border-white/20">
                        <span class="text-[9px] font-black text-slate-400">MIE</span><span class="text-lg font-bold">4</span>
                    </div>
                    <div class="flex flex-col items-center min-w-[52px] py-3 rounded-2xl bg-white/40 border border-white/20 opacity-50">
                        <span class="text-[9px] font-black text-slate-400">JUE</span><span class="text-lg font-bold">5</span>
                    </div>
                </div>
            </section>

            <section class="ios-glass p-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="font-bold text-lg">Intensidad</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Puntos de esfuerzo</p>
                    </div>
                    <span id="intensity-val" class="text-4xl font-black text-blue-600">0</span>
                </div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="intensity-bar" class="bg-blue-600 h-full w-0 transition-all duration-1000"></div>
                </div>
            </section>
        </div>

        <div id="view-training" class="hidden space-y-4 animate-ios">
            <div class="ios-glass p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Rutina Libre</h2>
                    <span class="bg-blue-100 text-blue-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">Gym</span>
                </div>
                <div id="sets-list" class="space-y-3">
                    </div>
                <button onclick="addSet()" class="w-full mt-6 py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold text-sm btn-animate">+ Añadir Serie</button>
            </div>
        </div>

        <div id="view-historial" class="hidden animate-ios py-10 text-center">
            <div class="ios-glass p-10">
                <p class="text-slate-400 font-bold">No hay entrenamientos previos</p>
            </div>
        </div>
        <div id="view-ajustes" class="hidden animate-ios py-4 space-y-2">
            <div class="ios-glass p-4 flex justify-between items-center font-semibold"><span>Unidades</span><span class="text-blue-600">Métricas (Kg)</span></div>
            <div class="ios-glass p-4 flex justify-between items-center font-semibold"><span>Notificaciones</span><span class="text-slate-300">Off</span></div>
            <div class="ios-glass p-4 flex justify-between items-center font-semibold text-red-500" onclick="location.reload()"><span>Resetear App</span></div>
        </div>
    </main>

    <div class="fixed bottom-28 left-6 right-6 z-40">
        <button id="main-btn" onclick="handleMainAction()" class="w-full py-5 bg-blue-600 text-white rounded-[24px] font-bold text-lg shadow-xl shadow-blue-200 btn-animate transition-all duration-300">
            Iniciar Entrenamiento
        </button>
    </div>

    <nav class="fixed bottom-0 w-full h-24 bg-white/80 backdrop-blur-2xl border-t border-black/5 flex justify-around items-center px-8 safe-bottom z-50">
        <button onclick="changeTab('hoy')" id="btn-hoy" class="flex flex-col items-center gap-1.5 tab-active">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
            </svg>
            <span class="text-[9px] font-black tracking-tighter">HOY</span>
        </button>

        <button onclick="changeTab('historial')" id="btn-historial" class="flex flex-col items-center gap-1.5 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
            </svg>
            <span class="text-[9px] font-black tracking-tighter">HISTORIAL</span>
        </button>

        <button onclick="changeTab('ajustes')" id="btn-ajustes" class="flex flex-col items-center gap-1.5 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 12h9.75" />
            </svg>
            <span class="text-[9px] font-black tracking-tighter">AJUSTES</span>
        </button>
    </nav>

    <script>
        let isTraining = false;
        let seconds = 0;
        let timerId = null;
        let setIndex = 1;

        // --- NAVEGACIÓN ---
        function changeTab(tab) {
            if(isTraining) return; // Bloquear navegación si entrena

            const views = ['hoy', 'training', 'historial', 'ajustes'];
            const titles = { hoy: 'Actividad', historial: 'Calendario', ajustes: 'Ajustes' };
            
            views.forEach(v => {
                const el = document.getElementById('view-' + v);
                if(el) el.classList.add('hidden');
            });
            
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.getElementById('page-title').innerText = titles[tab] || 'Entreno';
            
            // Actualizar iconos
            ['hoy', 'historial', 'ajustes'].forEach(t => {
                const btn = document.getElementById('btn-' + t);
                btn.classList.toggle('tab-active', t === tab);
                btn.classList.toggle('text-slate-400', t !== tab);
            });
        }

        // --- ENTRENAMIENTO ---
        function handleMainAction() {
            const btn = document.getElementById('main-btn');
            const dashboard = document.getElementById('view-hoy');
            const trainingView = document.getElementById('view-training');
            const liveActivity = document.getElementById('live-activity');

            if(!isTraining) {
                // INICIAR
                isTraining = true;
                btn.innerText = "Finalizar Entrenamiento";
                btn.classList.replace('bg-blue-600', 'bg-red-500');
                btn.classList.replace('shadow-blue-200', 'shadow-red-200');
                
                dashboard.classList.add('hidden');
                trainingView.classList.remove('hidden');
                liveActivity.classList.remove('hidden');
                
                startTimer();
                if(setIndex === 1) addSet();
            } else {
                // FINALIZAR
                const confirmEnd = confirm("¿Quieres finalizar el entrenamiento?");
                if(confirmEnd) {
                    finishWorkout();
                }
            }
        }

        function addSet() {
            const list = document.getElementById('sets-list');
            const row = document.createElement('div');
            row.className = "flex items-center gap-3 bg-white/40 p-3 rounded-2xl animate-ios";
            row.innerHTML = `
                <span class="w-8 font-black text-blue-600 text-sm">#${setIndex++}</span>
                <input type="number" placeholder="Kg" class="w-full bg-white/60 rounded-xl p-3 text-center font-bold weight-in">
                <input type="number" placeholder="Reps" class="w-full bg-white/60 rounded-xl p-3 text-center font-bold reps-in">
                <button onclick="this.parentElement.remove()" class="text-slate-300 px-2">✕</button>
            `;
            list.appendChild(row);
        }

        function finishWorkout() {
            isTraining = false;
            clearInterval(timerId);
            
            // Calcular Intensidad
            let totalVolume = 0;
            const weights = document.querySelectorAll('.weight-in');
            const reps = document.querySelectorAll('.reps-in');
            
            weights.forEach((w, i) => {
                const vW = parseFloat(w.value) || 0;
                const vR = parseFloat(reps[i].value) || 0;
                totalVolume += (vW * vR);
            });

            const score = Math.min(Math.floor(totalVolume / 100), 100);
            
            // Actualizar UI Dashboard
            document.getElementById('intensity-val').innerText = score;
            document.getElementById('intensity-bar').style.width = score + '%';

            // Reset UI
            document.getElementById('main-btn').innerText = "Iniciar Entrenamiento";
            document.getElementById('main-btn').classList.replace('bg-red-500', 'bg-blue-600');
            document.getElementById('live-activity').classList.add('hidden');
            
            changeTab('hoy');
            
            // Limpiar entreno
            document.getElementById('sets-list').innerHTML = '';
            setIndex = 1;
            seconds = 0;
            document.getElementById('timer').innerText = "00:00";
        }

        function startTimer() {
            timerId = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        // Fecha Actual
        const d = new Date();
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('current-date').innerText = d.toLocaleDateString('es-ES', options);

    </script>
</body>
</html>
