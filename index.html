<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --ios-bg: #F2F2F7; --ios-accent: #007AFF; --ios-green: #34C759; }
        body { font-family: 'Inter', sans-serif; background: var(--ios-bg); color: #1c1c1e; }
        .ios-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; border: 0.5px solid rgba(255, 255, 255, 0.2); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input[type="number"] { background: rgba(0,0,0,0.05); border-radius: 10px; padding: 8px; text-align: center; font-weight: bold; width: 60px; }
        .hidden { display: none; }
        .tab-active { color: var(--ios-accent); }
    </style>
</head>
<body class="pb-32">

    <header class="pt-14 px-6 pb-4 sticky top-0 z-50 bg-[#F2F2F7]/90 backdrop-blur-md">
        <div id="live-status" class="hidden mb-4 p-4 bg-black text-white rounded-[20px] flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                <span id="timer" class="font-mono font-bold">00:00</span>
            </div>
            <span class="text-[10px] font-bold opacity-60">ENTRENAMIENTO ACTIVO</span>
        </div>
        <h1 id="page-title" class="text-3xl font-extrabold tracking-tight">Actividad</h1>
    </header>

    <main id="app-content" class="px-4 space-y-6">
        <div id="view-dashboard" class="space-y-6">
            <section class="ios-glass p-5">
                <div class="flex justify-between items-center mb-4 px-1 text-sm font-bold opacity-40 uppercase tracking-widest">Marzo 2026</div>
                <div class="flex justify-between gap-2 overflow-x-auto no-scrollbar">
                    <div class="flex flex-col items-center min-w-[50px] py-3 rounded-2xl bg-white/50"><span class="text-[10px] font-bold opacity-40">LUN</span><span class="text-lg font-bold">2</span></div>
                    <div class="flex flex-col items-center min-w-[50px] py-3 rounded-2xl bg-blue-600 text-white shadow-lg"><span class="text-[10px] font-bold opacity-80">MAR</span><span class="text-lg font-bold">3</span></div>
                    <div class="flex flex-col items-center min-w-[50px] py-3 rounded-2xl bg-white/50"><span class="text-[10px] font-bold opacity-40">MIE</span><span class="text-lg font-bold">4</span></div>
                </div>
            </section>

            <section class="ios-glass p-6">
                <h3 class="font-bold text-lg mb-1">Última Intensidad</h3>
                <div class="flex items-center gap-4">
                    <div class="text-4xl font-black text-blue-600" id="last-intensity">0</div>
                    <p class="text-sm text-slate-500 leading-tight">Tu rendimiento hoy fue un 12% superior al promedio.</p>
                </div>
            </section>
        </div>

        <div id="view-training" class="hidden space-y-4">
            <div class="ios-glass p-6 space-y-4">
                <div class="flex justify-between items-center border-b pb-4 border-black/5">
                    <h2 class="font-bold">Press de Banca</h2>
                    <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-lg font-bold">Pecho</span>
                </div>
                <div class="flex justify-between items-center text-sm font-semibold text-slate-400 px-2">
                    <span>SERIE</span><span>KG</span><span>REPS</span><span>OK</span>
                </div>
                <div id="sets-container" class="space-y-3">
                    </div>
                <button onclick="addSet()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 font-bold text-sm">+ Añadir Serie</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-28 left-6 right-6 z-40">
        <button id="main-action" onclick="toggleWorkout()" class="w-full py-5 bg-[#007AFF] text-white rounded-[24px] font-bold text-lg shadow-xl active:scale-95 transition-all">
            Iniciar Entrenamiento
        </button>
    </div>

    <nav class="fixed bottom-0 w-full h-24 bg-white/80 backdrop-blur-xl border-t border-black/5 flex justify-around items-center px-8 safe-bottom">
        <div class="tab-active flex flex-col items-center"><span class="text-2xl">🔘</span><span class="text-[9px] font-bold mt-1">HOY</span></div>
        <div class="text-slate-400 flex flex-col items-center"><span class="text-2xl">🗓️</span><span class="text-[9px] font-bold mt-1">HISTORIAL</span></div>
        <div class="text-slate-400 flex flex-col items-center"><span class="text-2xl">⚙️</span><span class="text-[9px] font-bold mt-1">AJUSTES</span></div>
    </nav>

    <script>
        let isTraining = false;
        let timerInterval;
        let seconds = 0;
        let setCounter = 1;

        function toggleWorkout() {
            isTraining = !isTraining;
            const btn = document.getElementById('main-action');
            const dashboard = document.getElementById('view-dashboard');
            const training = document.getElementById('view-training');
            const status = document.getElementById('live-status');

            if(isTraining) {
                // Empezar
                btn.innerText = "Finalizar Entrenamiento";
                btn.classList.replace('bg-[#007AFF]', 'bg-red-500');
                dashboard.classList.add('hidden');
                training.classList.remove('hidden');
                status.classList.remove('hidden');
                startTimer();
                if(setCounter === 1) addSet(); // Primera serie por defecto
            } else {
                // Terminar y Calcular Intensidad
                calculateFinalIntensity();
                btn.innerText = "Iniciar Entrenamiento";
                btn.classList.replace('bg-red-500', 'bg-[#007AFF]');
                dashboard.classList.remove('hidden');
                training.classList.add('hidden');
                status.classList.add('hidden');
                stopTimer();
            }
        }

        function addSet() {
            const container = document.getElementById('sets-container');
            const row = document.createElement('div');
            row.className = "flex justify-between items-center bg-white/50 p-3 rounded-2xl animate-in slide-in-from-bottom-2";
            row.innerHTML = `
                <span class="font-bold text-blue-600 w-8">#${setCounter++}</span>
                <input type="number" placeholder="0" class="weight-input">
                <input type="number" placeholder="0" class="reps-input">
                <input type="checkbox" class="w-6 h-6 rounded-full accent-green-500">
            `;
            container.appendChild(row);
        }

        function calculateFinalIntensity() {
            const weights = document.querySelectorAll('.weight-input');
            const reps = document.querySelectorAll('.reps-input');
            let totalVolume = 0;
            
            weights.forEach((w, i) => {
                const valW = parseFloat(w.value) || 0;
                const valR = parseFloat(reps[i].value) || 0;
                totalVolume += (valW * valR);
            });

            const intensity = Math.floor(totalVolume / 100); // Métrica simplificada
            document.getElementById('last-intensity').innerText = intensity;
            alert(`Resumen: Intensidad de ${intensity} pts. ¡Buen trabajo!`);
            
            // Limpiar para el próximo
            document.getElementById('sets-container').innerHTML = '';
            setCounter = 1;
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }
    </script>
</body>
</html>
