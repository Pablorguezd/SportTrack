<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitTrack Pro</title>
    
    <link rel="icon" type="image/png" href="https://ui-avatars.com/api/?name=FT&background=007AFF&color=fff&size=128">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=FT&background=007AFF&color=fff&size=180">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --ios-bg: #F2F2F7; --ios-accent: #007AFF; }
        body { font-family: 'Inter', sans-serif; background: var(--ios-bg); color: #1c1c1e; user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .ios-glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); border-radius: 28px; border: 0.5px solid rgba(255, 255, 255, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Modales */
        .ios-modal { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 32px; border-top-right-radius: 32px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 100; padding: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); touch-action: none; }
        .modal-active { transform: translateY(0) !important; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .drag-handle { width: 40px; height: 5px; background: #D1D1D6; border-radius: 10px; margin: 0 auto 20px; cursor: grab; }
        
        .btn-animate:active { transform: scale(0.96); opacity: 0.8; transition: 0.1s; }
        .tab-active { color: var(--ios-accent) !important; }
        .animate-ios { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Lista de ejercicios scrolleable dentro del modal */
        .scrollable-modal-content { max-height: 60vh; overflow-y: auto; touch-action: pan-y; padding-bottom: 20px;}
    </style>
</head>
<body class="pb-32">

    <div id="overlay" class="overlay" onclick="closeAllModals()"></div>

    <header class="pt-14 px-6 pb-4 sticky top-0 z-50 bg-[#F2F2F7]/90 backdrop-blur-md border-b border-black/[0.03]">
        <div id="live-activity" class="hidden mb-4 p-4 bg-black text-white rounded-[22px] flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></div>
                <span id="timer" class="font-mono text-lg font-bold">00:00</span>
            </div>
            <span class="text-[9px] font-black opacity-50 tracking-widest uppercase">Entrenando</span>
        </div>
        <div class="flex justify-between items-end">
            <div>
                <p id="current-date" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1"></p>
                <h1 id="page-title" class="text-3xl font-extrabold tracking-tight">Actividad</h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-black/5 text-lg">👤</div>
        </div>
    </header>

    <main id="main-content" class="px-4 mt-4 space-y-6">
        
        <div id="view-hoy" class="space-y-6 animate-ios">
            <section class="ios-glass p-5">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="font-bold text-xs text-slate-400 uppercase tracking-tight" id="month-label">Marzo</h3>
                    <button onclick="openModal('modal-calendario')" class="text-blue-600 text-xs font-bold btn-animate">Ver calendario</button>
                </div>
                <div class="flex justify-between gap-2 overflow-x-auto no-scrollbar" id="calendar-strip"></div>
            </section>
            <section class="ios-glass p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">Última Intensidad</h3>
                    <span id="intensity-val" class="text-3xl font-black text-blue-600">0</span>
                </div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="intensity-bar" class="bg-blue-600 h-full w-0 transition-all duration-700"></div>
                </div>
            </section>
        </div>

        <div id="view-historial" class="hidden space-y-6 animate-ios py-10">
            <div class="ios-glass p-10 text-center">
                <span class="text-4xl block mb-4">📊</span>
                <h3 class="font-bold text-lg text-slate-800">Próximamente</h3>
                <p class="text-sm text-slate-400 mt-2">Aquí verás tu historial de entrenamientos pasados.</p>
            </div>
        </div>

        <div id="view-ajustes" class="hidden space-y-6 animate-ios">
            <div class="ios-glass p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-lg">Base de Datos de Ejercicios</h3>
                    <button onclick="crearEjercicioNuevo()" class="bg-blue-100 text-blue-600 text-xs font-bold px-3 py-1.5 rounded-full btn-animate">+ Nuevo</button>
                </div>
                <div id="settings-exercise-list" class="space-y-3">
                    </div>
            </div>
        </div>

        <div id="view-training" class="hidden space-y-6 pb-20">
            <div id="workout-list" class="space-y-4"></div>
            <button onclick="abrirSelectorEjercicio()" class="w-full py-4 border-2 border-dashed border-slate-300 rounded-[22px] text-slate-400 font-bold text-sm btn-animate">+ Añadir Ejercicio</button>
        </div>
    </main>

    <div class="fixed bottom-28 left-6 right-6 z-40" id="main-btn-container">
        <button id="main-btn" onclick="toggleWorkout()" class="w-full py-5 bg-blue-600 text-white rounded-[24px] font-bold text-lg shadow-xl shadow-blue-100 btn-animate transition-all">Iniciar Entrenamiento</button>
    </div>

    <div id="modal-calendario" class="ios-modal h-[70vh]">
        <div class="drag-handle" id="handle-calendario"></div>
        <h2 class="text-xl font-bold mb-6 text-center">Calendario</h2>
        <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-slate-300 mb-4 uppercase">
            <span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
        </div>
        <div id="full-calendar-grid" class="grid grid-cols-7 gap-3"></div>
    </div>

    <div id="modal-seleccionar-ejercicio" class="ios-modal h-[75vh]">
        <div class="drag-handle" id="handle-selector"></div>
        <h2 class="text-xl font-bold mb-2 text-center">Elige un ejercicio</h2>
        <p class="text-center text-xs text-slate-400 mb-6">Fuerza o Cardio</p>
        <div class="scrollable-modal-content" id="modal-exercise-list">
            </div>
    </div>

    <nav class="fixed bottom-0 w-full h-24 bg-white/80 backdrop-blur-2xl border-t border-black/5 flex justify-around items-center px-8 z-50">
        <button onclick="switchTab('hoy')" class="flex flex-col items-center gap-1 tab-active text-blue-600" id="tab-hoy">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z"/></svg>
            <span class="text-[9px] font-black">HOY</span>
        </button>
        <button onclick="switchTab('historial')" class="flex flex-col items-center gap-1 text-slate-400" id="tab-historial">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>
            <span class="text-[9px] font-black">HISTORIAL</span>
        </button>
        <button onclick="switchTab('ajustes')" class="flex flex-col items-center gap-1 text-slate-400" id="tab-ajustes">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 12h9.75"/></svg>
            <span class="text-[9px] font-black">AJUSTES</span>
        </button>
    </nav>

    <script>
        // --- BASE DE DATOS DE EJERCICIOS (LocalStorage) ---
        const defaultExercises = [
            { id: 1, name: 'Press Banca', icon: '🏋️‍♂️', type: 'fuerza' },
            { id: 2, name: 'Sentadilla', icon: '🦵', type: 'fuerza' },
            { id: 3, name: 'Dominadas', icon: '🧗', type: 'fuerza' },
            { id: 4, name: 'Cinta de Correr', icon: '🏃‍♂️', type: 'cardio' },
            { id: 5, name: 'Bicicleta Estática', icon: '🚴', type: 'cardio' }
        ];

        // Cargar desde LocalStorage o usar defaults
        let myExercises = JSON.parse(localStorage.getItem('fitTrack_DB')) || defaultExercises;

        function saveExercisesDB() {
            localStorage.setItem('fitTrack_DB', JSON.stringify(myExercises));
        }

        // --- GESTIÓN DE PESTAÑAS (TABS) ---
        let isTraining = false;
        
        function switchTab(tabId) {
            if(isTraining) return; // No dejar cambiar de pestaña si entrena
            
            const views = ['hoy', 'historial', 'ajustes'];
            const titles = { hoy: 'Actividad', historial: 'Historial', ajustes: 'Ajustes' };
            
            views.forEach(v => {
                // Ocultar vistas
                document.getElementById('view-' + v).classList.add('hidden');
                // Desactivar iconos
                document.getElementById('tab-' + v).classList.remove('tab-active', 'text-blue-600');
                document.getElementById('tab-' + v).classList.add('text-slate-400');
            });

            // Activar vista seleccionada
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('tab-active', 'text-blue-600');
            document.getElementById('tab-' + tabId).classList.remove('text-slate-400');
            document.getElementById('page-title').innerText = titles[tabId];

            // Renderizar ajustes si se entra ahí
            if(tabId === 'ajustes') renderAjustes();
            
            // Ocultar/Mostrar botón principal
            if(tabId === 'hoy') document.getElementById('main-btn-container').classList.remove('hidden');
            else document.getElementById('main-btn-container').classList.add('hidden');
        }

        // --- RENDERIZAR AJUSTES (Gestión de BBDD) ---
        function renderAjustes() {
            const list = document.getElementById('settings-exercise-list');
            list.innerHTML = '';
            myExercises.forEach(ex => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-white/50 p-3 rounded-2xl border border-black/5">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${ex.icon}</span>
                            <div>
                                <p class="font-bold text-sm">${ex.name}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">${ex.type}</p>
                            </div>
                        </div>
                        <button onclick="eliminarEjercicioDB(${ex.id})" class="text-red-500 text-xs font-bold px-2 py-1 bg-red-50 rounded-lg">Borrar</button>
                    </div>
                `;
            });
        }

        function crearEjercicioNuevo() {
            const name = prompt("Nombre del ejercicio:");
            if(!name) return;
            const icon = prompt("Añade un Emoji para el icono (Ej: 🥊):") || "💪";
            const isCardio = confirm("¿Es un ejercicio de Cardio? (Aceptar = Sí / Cancelar = Fuerza)");
            
            myExercises.push({
                id: Date.now(),
                name: name,
                icon: icon,
                type: isCardio ? 'cardio' : 'fuerza'
            });
            saveExercisesDB();
            renderAjustes();
        }

        function eliminarEjercicioDB(id) {
            if(confirm("¿Seguro que quieres borrar este ejercicio?")) {
                myExercises = myExercises.filter(ex => ex.id !== id);
                saveExercisesDB();
                renderAjustes();
            }
        }

        // --- ENTRENAMIENTO ---
        let timerSeconds = 0;
        let timerInterval;

        function toggleWorkout() {
            const btn = document.getElementById('main-btn');
            const viewHoy = document.getElementById('view-hoy');
            const viewTraining = document.getElementById('view-training');
            const liveAct = document.getElementById('live-activity');

            if (!isTraining) {
                isTraining = true;
                btn.innerText = "Finalizar Entrenamiento";
                btn.classList.replace('bg-blue-600', 'bg-red-500');
                btn.classList.replace('shadow-blue-100', 'shadow-red-200');
                viewHoy.classList.add('hidden');
                viewTraining.classList.remove('hidden');
                liveAct.classList.remove('hidden');
                startTimer();
            } else {
                if(confirm("¿Finalizar rutina?")) {
                    finishWorkout();
                    btn.innerText = "Iniciar Entrenamiento";
                    btn.classList.replace('bg-red-500', 'bg-blue-600');
                    btn.classList.replace('shadow-red-200', 'shadow-blue-100');
                    viewHoy.classList.remove('hidden');
                    viewTraining.classList.add('hidden');
                    liveAct.classList.add('hidden');
                }
            }
        }

        // --- FLUJO SELECCIÓN DE EJERCICIO ---
        function abrirSelectorEjercicio() {
            const list = document.getElementById('modal-exercise-list');
            list.innerHTML = '';
            
            myExercises.forEach(ex => {
                const isFuerza = ex.type === 'fuerza';
                const color = isFuerza ? 'blue' : 'green';
                list.innerHTML += `
                    <button onclick="addExerciseToWorkout(${ex.id})" class="w-full mb-3 flex items-center gap-4 bg-[#F2F2F7] p-4 rounded-2xl active:scale-95 transition-transform text-left">
                        <span class="text-3xl bg-white w-12 h-12 flex items-center justify-center rounded-xl shadow-sm">${ex.icon}</span>
                        <div>
                            <p class="font-bold text-slate-800">${ex.name}</p>
                            <span class="text-[10px] font-black uppercase text-${color}-500 bg-${color}-100 px-2 py-0.5 rounded-md">${ex.type}</span>
                        </div>
                    </button>
                `;
            });
            openModal('modal-seleccionar-ejercicio');
        }

        function addExerciseToWorkout(exerciseId) {
            const ex = myExercises.find(e => e.id === exerciseId);
            const list = document.getElementById('workout-list');
            const blockId = Date.now();
            const card = document.createElement('div');
            card.className = "ios-glass p-5 animate-ios space-y-4";
            
            if(ex.type === 'fuerza') {
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2"><span class="text-xl">${ex.icon}</span><h4 class="font-bold text-blue-600">${ex.name}</h4></div>
                        <button onclick="this.parentElement.parentElement.remove()" class="text-xs text-slate-300">✕</button>
                    </div>
                    <div id="sets-${blockId}" class="space-y-2"></div>
                    <button onclick="addSetRow(${blockId})" class="text-[11px] font-black text-blue-600 uppercase tracking-wider">+ Añadir Serie</button>
                `;
            } else {
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2"><span class="text-xl">${ex.icon}</span><h4 class="font-bold text-green-600">${ex.name}</h4></div>
                        <button onclick="this.parentElement.parentElement.remove()" class="text-xs text-slate-300">✕</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><p class="text-[9px] font-black text-slate-400 mb-1">DISTANCIA (KM)</p><input type="number" step="0.1" class="w-full bg-black/5 p-3 rounded-xl font-bold cardio-km" placeholder="0.0"></div>
                        <div><p class="text-[9px] font-black text-slate-400 mb-1">TIEMPO (MIN)</p><input type="number" class="w-full bg-black/5 p-3 rounded-xl font-bold cardio-min" placeholder="0"></div>
                    </div>
                `;
            }
            list.appendChild(card);
            closeAllModals();
            
            // Añadir primera serie por defecto si es fuerza
            if(ex.type === 'fuerza') addSetRow(blockId);
        }

        function addSetRow(blockId) {
            const container = document.getElementById(`sets-${blockId}`);
            const row = document.createElement('div');
            row.className = "flex gap-2 items-center animate-ios";
            row.innerHTML = `<input type="number" placeholder="Kg" class="w-full bg-black/5 p-2.5 rounded-xl text-center font-bold f-kg text-sm"><input type="number" placeholder="Reps" class="w-full bg-black/5 p-2.5 rounded-xl text-center font-bold f-reps text-sm">`;
            container.appendChild(row);
        }

        function finishWorkout() {
            isTraining = false;
            clearInterval(timerInterval);
            let totalIntensity = 0;
            
            document.querySelectorAll('.f-kg').forEach((el, i) => {
                const kg = parseFloat(el.value) || 0;
                const reps = parseFloat(document.querySelectorAll('.f-reps')[i].value) || 0;
                totalIntensity += (kg * reps) / 100;
            });
            
            document.querySelectorAll('.cardio-km').forEach(el => {
                totalIntensity += (parseFloat(el.value) || 0) * 10;
            });

            const final = Math.min(Math.round(totalIntensity), 100);
            document.getElementById('intensity-val').innerText = final;
            document.getElementById('intensity-bar').style.width = final + '%';
            document.getElementById('workout-list').innerHTML = '';
            timerSeconds = 0;
            document.getElementById('timer').innerText = "00:00";
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timerSeconds++;
                const m = Math.floor(timerSeconds / 60).toString().padStart(2,'0');
                const s = (timerSeconds % 60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- GESTIÓN DE MODALES DESLIZABLES ---
        function setupDraggable(modalId) {
            const modal = document.getElementById(modalId);
            let startY = 0, currentY = 0;

            modal.addEventListener('touchstart', (e) => { 
                // Evitar arrastrar si estamos haciendo scroll dentro del modal
                if(e.target.closest('.scrollable-modal-content')) return;
                startY = e.touches[0].clientY; modal.style.transition = 'none'; 
            }, {passive: true});
            modal.addEventListener('touchmove', (e) => { 
                if(e.target.closest('.scrollable-modal-content')) return;
                currentY = e.touches[0].clientY - startY; 
                if (currentY > 0) modal.style.transform = `translateY(${currentY}px)`; 
            }, {passive: true});
            modal.addEventListener('touchend', (e) => { 
                if(e.target.closest('.scrollable-modal-content')) return;
                modal.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                if (currentY > 100) closeAllModals(); else modal.style.transform = 'translateY(0)';
                currentY = 0; 
            });
        }

        function openModal(id) {
            document.getElementById(id).classList.add('modal-active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeAllModals() {
            document.querySelectorAll('.ios-modal').forEach(m => { m.classList.remove('modal-active'); m.style.transform = ''; });
            document.getElementById('overlay').classList.remove('active');
        }

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            const d = new Date();
            document.getElementById('current-date').innerText = d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('month-label').innerText = d.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            
            setupDraggable('modal-calendario');
            setupDraggable('modal-seleccionar-ejercicio');

            const strip = document.getElementById('calendar-strip');
            for(let i=-2; i<5; i++) {
                const day = new Date(); day.setDate(d.getDate() + i);
                const isToday = i === 0;
                strip.innerHTML += `
                    <div class="flex flex-col items-center min-w-[55px] py-4 rounded-2xl ${isToday ? 'bg-blue-600 text-white shadow-lg' : 'bg-white/40 border border-white/20 text-slate-400'}">
                        <span class="text-[9px] font-black opacity-70 mb-1">${day.toLocaleDateString('es-ES', {weekday:'short'}).toUpperCase()}</span>
                        <span class="text-lg font-extrabold">${day.getDate()}</span>
                    </div>`;
            }

            const grid = document.getElementById('full-calendar-grid');
            for(let i=1; i<=31; i++) {
                const isToday = i === d.getDate();
                grid.innerHTML += `<div class="aspect-square flex items-center justify-center rounded-2xl ${isToday ? 'bg-blue-600 text-white font-bold' : 'bg-slate-50 text-slate-400 font-medium'} text-sm">${i}</div>`;
            }
        };
    </script>
</body>
</html>
