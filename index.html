<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitTrack Pro - iOS 26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --ios-bg: #F2F2F7; --ios-accent: #007AFF; }
        body { font-family: 'Inter', sans-serif; background: var(--ios-bg); -webkit-tap-highlight-color: transparent; }
        .ios-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 28px; border: 0.5px solid rgba(255, 255, 255, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .intensity-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; }
        .low-int { background: #34C759; }    /* Verde: Recuperación */
        .mid-int { background: #007AFF; }    /* Azul: Hipertrofia */
        .high-int { background: #5856D6; }   /* Morado: Fuerza máxima */
        .active-btn { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="pb-32">

    <header class="pt-14 px-6 pb-4 sticky top-0 z-50 bg-[#F2F2F7]/90 backdrop-blur-md">
        <div id="live-activity" class="hidden mb-4 p-4 bg-black text-white rounded-[24px] flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span id="timer" class="font-mono text-lg font-bold">00:00</span>
            </div>
            <button onclick="stopWorkout()" class="bg-white/20 px-4 py-1.5 rounded-full text-xs font-bold hover:bg-white/30">FINALIZAR</button>
        </div>
        <div class="flex justify-between items-end">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Mi Progreso</p>
                <h1 class="text-3xl font-extrabold tracking-tight">Actividad</h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-xl">👤</div>
        </div>
    </header>

    <main class="px-4 space-y-6">
        <section class="ios-glass p-5">
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="font-bold text-lg text-slate-800">Marzo 2026</h3>
                <button class="text-blue-600 text-sm font-semibold">Ver mes</button>
            </div>
            <div class="flex justify-between overflow-x-auto no-scrollbar gap-2">
                <div class="flex flex-col items-center min-w-[50px] py-3 rounded-2xl bg-white/40">
                    <span class="text-[10px] font-bold text-slate-400">LUN</span>
                    <span class="text-lg font-bold">2</span>
                </div>
                <div class="flex flex-col items-center min-w-[50px] py-3 rounded-2xl bg-blue-600 text-white shadow-md">
                    <span class="text-[10px] font-bold opacity-80">MAR</span>
                    <span class="text-lg font-bold">3</span>
                    <div class="intensity-dot bg-white"></div>
                </div>
                <div class="flex flex-col items-center min-w-[50px] py-3 rounded-2xl bg-white/40">
                    <span class="text-[10px] font-bold text-slate-400">MIE</span>
                    <span class="text-lg font-bold">4</span>
                    <div class="intensity-dot high-int"></div>
                </div>
                </div>
        </section>

        <section class="ios-glass p-6">
            <h2 class="font-bold text-slate-800 mb-1">Score de Intensidad</h2>
            <p class="text-xs text-slate-400 mb-4 tracking-wide">Basado en volumen y esfuerzo relativo</p>
            <div class="flex items-end gap-2 h-24 mb-2">
                <div class="flex-1 bg-slate-200 rounded-t-lg h-[40%]"></div>
                <div class="flex-1 bg-blue-500 rounded-t-lg h-[85%]"></div>
                <div class="flex-1 bg-slate-200 rounded-t-lg h-[20%]"></div>
                <div class="flex-1 bg-indigo-600 rounded-t-lg h-[95%]"></div>
                <div class="flex-1 bg-slate-200 rounded-t-lg h-[50%]"></div>
            </div>
            <p class="text-[10px] font-bold text-center text-slate-400">ÚLTIMOS 5 ENTRENAMIENTOS</p>
        </section>

        <div id="start-btn-container" class="fixed bottom-28 left-6 right-6">
            <button onclick="startWorkout()" class="w-full py-5 bg-[#007AFF] text-white rounded-[22px] font-bold text-lg shadow-xl shadow-blue-200 active:scale-95 transition-transform">
                Iniciar Entrenamiento
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full h-24 bg-white/80 backdrop-blur-xl border-t border-black/5 flex justify-around items-center px-8">
        <div class="text-blue-600 flex flex-col items-center"><span class="text-2xl">🔘</span><span class="text-[9px] font-bold mt-1">HOY</span></div>
        <div class="text-slate-400 flex flex-col items-center"><span class="text-2xl">🗓️</span><span class="text-[9px] font-bold mt-1">HISTORIAL</span></div>
        <div class="text-slate-400 flex flex-col items-center"><span class="text-2xl">⚙️</span><span class="text-[9px] font-bold mt-1">AJUSTES</span></div>
    </nav>

    <script>
        let timerInterval;
        let seconds = 0;

        function startWorkout() {
            document.getElementById('live-activity').classList.remove('hidden');
            document.getElementById('start-btn-container').classList.add('hidden');
            timerInterval = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                document.getElementById('timer').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
            if(window.navigator.vibrate) window.navigator.vibrate(10);
        }

        function stopWorkout() {
            clearInterval(timerInterval);
            alert("¡Entrenamiento finalizado! Intensidad calculada: 84 pts.");
            document.getElementById('live-activity').classList.add('hidden');
            document.getElementById('start-btn-container').classList.remove('hidden');
            seconds = 0;
        }
    </script>
</body>
</html>
